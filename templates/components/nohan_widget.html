{% load static %}
<!-- Widget NOHAN - Assistant IA -->
<div id="nohan-wrapper" style="position: fixed; bottom: 20px; right: 20px; z-index: 1050; font-family: 'Inter', sans-serif;">
    <!-- Bouton d'activation -->
    <button id="nohan-toggle" class="btn rounded-circle shadow-lg d-flex align-items-center justify-content-center p-0 overflow-hidden" style="width: 65px; height: 65px; border: 3px solid #DAA520; transition: all 0.3s ease; background: white;">
        <img src="{% static 'img/nohan_avatar.png' %}" alt="NOHAN Avatar" class="w-100 h-100 object-fit-cover">
    </button>

    <!-- Fenêtre de Chat -->
    <div id="nohan-chat" class="card shadow-lg d-none" style="width: 380px; border-radius: 25px; overflow: hidden; border: none; transform: translateY(10px); transition: all 0.3s ease;">
        <div class="card-header d-flex align-items-center justify-content-between p-3" style="background: linear-gradient(135deg, var(--color-dark-green), #062c1a); color: white; border-bottom: 2px solid #DAA520;">
            <div class="d-flex align-items-center">
                <div class="rounded-circle bg-white p-1 me-2" style="width: 45px; height: 45px; overflow: hidden; border: 2px solid #DAA520;">
                    <img src="{% static 'img/nohan_avatar.png' %}" alt="NOHAN Avatar" class="w-100 h-100 object-fit-cover">
                </div>
                <div>
                    <h6 class="mb-0 fw-bold" style="letter-spacing: 1px;">NOHAN</h6>
                    <small class="opacity-75" style="font-size: 0.75rem;"><i class="fa-solid fa-circle text-success me-1" style="font-size: 0.5rem;"></i> Expert Immobilier</small>
                </div>
            </div>
            <button type="button" class="btn-close btn-close-white" id="nohan-close" style="font-size: 0.8rem;"></button>
        </div>
        
        <div class="card-body p-0 d-flex flex-column" style="height: 400px; background-color: #f8f9fa;">
            <div id="nohan-messages" class="flex-grow-1 p-3 overflow-auto" style="scrollbar-width: thin;">
                <!-- Message d'accueil -->
                <div class="d-flex mb-3">
                    <div class="bg-white p-3 rounded-4 shadow-sm small border-start border-4 border-success" style="max-width: 90%; line-height: 1.5;">
                        Bienvenue ! Je suis <strong>NOHAN</strong>, votre conseiller expert Loger Sénégal. <br><br>
                        Je peux vous aider à comprendre le système de points <strong>NILS</strong>, à obtenir votre <strong>Badge Solvable</strong> ou à naviguer parmi nos annonces certifiées. <br><br>
                        Comment puis-je vous servir ?
                    </div>
                </div>
                <div id="nohan-quick-replies" class="d-flex flex-wrap gap-2 mt-2 px-1">
                    <button class="btn btn-sm nohan-quick-btn" data-query="🏠 Je cherche un appartement">🏠 Louer un bien</button>
                    <button class="btn btn-sm nohan-quick-btn" data-query="🛡️ Comment obtenir le Badge Solvable ?">🛡️ Badge Solvable</button>
                    <button class="btn btn-sm nohan-quick-btn" data-query="📈 Je veux booster mon annonce">📈 Booster mon annonce</button>
                </div>
            </div>
            
            <div class="p-3 bg-white border-top">
                <div class="input-group">
                    <input type="text" id="nohan-input" class="form-control border-0 bg-light small" placeholder="Posez votre question..." style="border-radius: 20px 0 0 20px; font-size: 0.9rem;">
                    <button class="btn btn-success" id="nohan-send" style="border-radius: 0 20px 20px 0;">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    #nohan-toggle:hover {
        transform: scale(1.1);
        background-color: var(--color-dark-green);
    }
    .nohan-msg-user {
        background-color: var(--color-light-green);
        color: var(--color-dark-green);
        border-radius: 15px 15px 2px 15px;
        padding: 8px 12px;
        margin-bottom: 10px;
        align-self: flex-end;
        max-width: 85%;
        font-size: 0.85rem;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .nohan-msg-ai {
        background-color: white;
        color: #333;
        border-radius: 15px 15px 15px 2px;
        padding: 8px 12px;
        margin-bottom: 10px;
        align-self: flex-start;
        max-width: 85%;
        font-size: 0.85rem;
        border: 1px solid #eee;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    
    /* Styles pour les Cartes de Biens Nohan */
    .nohan-property-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        margin: 10px 0;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        border: 1px solid #eee;
        transition: transform 0.2s;
    }
    .nohan-property-card:hover { transform: translateY(-3px); }
    .nohan-property-card img { width: 100%; height: 120px; object-fit: cover; }
    .nohan-property-card-body { padding: 10px; }
    .nohan-property-card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; color: #333; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .nohan-property-card-price { color: #DAA520; font-weight: 800; font-size: 0.85rem; margin-bottom: 8px; }
    .nohan-property-btn { background: #000; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; width: 100%; text-align: center; text-decoration: none; display: block; }
    .nohan-property-btn:hover { background: #DAA520; color: white; }
    #nohan-messages {
        display: flex;
        flex-direction: column;
    }
    .nohan-typing {
        font-style: italic;
        font-size: 0.7rem;
        color: #999;
        margin-bottom: 10px;
    }
    .nohan-quick-btn {
        border-radius: 15px;
        font-size: 0.75rem;
        background: white;
        border: 1px solid var(--color-dark-green);
        color: var(--color-dark-green);
        transition: all 0.2s ease;
        padding: 5px 12px;
    }
    .nohan-quick-btn:hover {
        background: var(--color-dark-green);
        color: white;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggle = document.getElementById('nohan-toggle');
        const close = document.getElementById('nohan-close');
        const chat = document.getElementById('nohan-chat');
        const input = document.getElementById('nohan-input');
        const sendBtn = document.getElementById('nohan-send');
        const messagesContainer = document.getElementById('nohan-messages');
        
        let history = [];

        toggle.onclick = () => {
            chat.classList.toggle('d-none');
            if (!chat.classList.contains('d-none')) {
                input.focus();
            }
        };

        close.onclick = () => chat.classList.add('d-none');

        async function sendMessage(customText = null) {
            const text = customText || input.value.trim();
            if (!text) return;

            // Masquer les suggestions après le premier message
            const qr = document.getElementById('nohan-quick-replies');
            if(qr) qr.style.display = 'none';

            // Ajouter le message utilisateur à l'UI
            const userDiv = document.createElement('div');
            userDiv.className = 'nohan-msg-user';
            userDiv.textContent = text;
            messagesContainer.appendChild(userDiv);
            
            input.value = '';
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Effet "En train d'écrire"
            const typingDiv = document.createElement('div');
            typingDiv.className = 'nohan-typing';
            typingDiv.textContent = 'Nohan est en train de réfléchir...';
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch('{% url "nohan_chat" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({ message: text, history: history })
                });

                const data = await response.json();
                typingDiv.remove();

                if (data.response) {
                    const aiDiv = document.createElement('div');
                    aiDiv.className = 'nohan-msg-ai';
                    
                    // 1. On extrait d'abord les PROPERTY_CARD pour éviter que le link-parser ne les corrompe
                    let cards = [];
                    let textWithPlaceholders = data.response.replace(/\[PROPERTY_CARD:(.*?)\]/g, (match, dataStr) => {
                        try {
                            const pData = JSON.parse(dataStr.replace(/&quot;/g, '"'));
                            const cardHtml = `
                                <div class="nohan-property-card shadow-sm border-0">
                                    <img src="${pData.image}" alt="${pData.title}" class="img-fluid rounded-top">
                                    <div class="nohan-property-card-body">
                                        <div class="nohan-property-card-title">${pData.title}</div>
                                        <div class="nohan-property-card-price text-success">${pData.price} FCFA</div>
                                        <a href="${pData.url}" class="btn btn-dark btn-sm w-100 mt-2" target="_blank">Voir l'annonce</a>
                                    </div>
                                </div>
                            `;
                            cards.push(cardHtml);
                            return `___PROPERTY_CARD_${cards.length - 1}___`;
                        } catch(e) {
                            console.error("Card parsing error", e);
                            return "";
                        }
                    });

                    // 2. On rend les liens cliquables dans le texte restant
                    let processedText = textWithPlaceholders.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: #DAA520; text-decoration: underline;">$1</a>');
                    processedText = processedText.replace(/\n/g, '<br>');

                    // 3. On réinjecte les cartes HTML
                    cards.forEach((cardHtml, index) => {
                        processedText = processedText.replace(`___PROPERTY_CARD_${index}___`, cardHtml);
                    });

                    aiDiv.innerHTML = processedText;
                    messagesContainer.appendChild(aiDiv);
                    
                    // Mettre à jour l'historique
                    history.push({role: 'user', content: text});
                    history.push({role: 'model', content: data.response});
                    if (history.length > 10) history = history.slice(-10);
                } else {
                    throw new Error(data.error || 'Erreur inconnue');
                }
            } catch (error) {
                if(typingDiv) typingDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'text-danger small mb-2';
                errorDiv.textContent = "Désolé, j'ai eu un souci technique : " + error.message;
                messagesContainer.appendChild(errorDiv);
            }
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Gérer les clics sur les boutons de suggestion
        document.querySelectorAll('.nohan-quick-btn').forEach(btn => {
            btn.onclick = () => sendMessage(btn.getAttribute('data-query'));
        });

        sendBtn.onclick = () => sendMessage();
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    });
</script>
