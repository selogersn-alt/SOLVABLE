<style>
    #nohan-toggle:hover {
        transform: scale(1.1);
        background-color: var(--color-dark-green);
    }
    .nohan-msg-user {
        background-color: var(--color-light-green);
        color: var(--color-dark-green);
        border-radius: 15px 15px 2px 15px;
        padding: 8px 12px;
        margin-bottom: 10px;
        align-self: flex-end;
        max-width: 85%;
        font-size: 0.85rem;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .nohan-msg-ai {
        background-color: white;
        color: #333;
        border-radius: 15px 15px 15px 2px;
        padding: 8px 12px;
        margin-bottom: 10px;
        align-self: flex-start;
        max-width: 85%;
        font-size: 0.85rem;
        border: 1px solid #eee;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    
    /* Styles pour les Cartes de Biens Nohan */
    .nohan-property-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        margin: 10px 0;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        border: 1px solid #eee;
        transition: transform 0.2s;
    }
    .nohan-property-card:hover { transform: translateY(-3px); }
    .nohan-property-card img { width: 100%; height: 120px; object-fit: cover; }
    .nohan-property-card-body { padding: 10px; }
    .nohan-property-card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; color: #333; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .nohan-property-card-price { color: #DAA520; font-weight: 800; font-size: 0.85rem; margin-bottom: 8px; }
    .nohan-property-btn { background: #000; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; width: 100%; text-align: center; text-decoration: none; display: block; }
    .nohan-property-btn:hover { background: #DAA520; color: white; }
    #nohan-messages {
        display: flex;
        flex-direction: column;
    }
    .nohan-typing {
        font-style: italic;
        font-size: 0.7rem;
        color: #999;
        margin-bottom: 10px;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggle = document.getElementById('nohan-toggle');
        const close = document.getElementById('nohan-close');
        const chat = document.getElementById('nohan-chat');
        const input = document.getElementById('nohan-input');
        const sendBtn = document.getElementById('nohan-send');
        const messagesContainer = document.getElementById('nohan-messages');
        
        let history = [];

        toggle.onclick = () => {
            chat.classList.toggle('d-none');
            if (!chat.classList.contains('d-none')) {
                input.focus();
            }
        };

        close.onclick = () => chat.classList.add('d-none');

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // Ajouter le message utilisateur à l'UI
            const userDiv = document.createElement('div');
            userDiv.className = 'nohan-msg-user';
            userDiv.textContent = text;
            messagesContainer.appendChild(userDiv);
            
            input.value = '';
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Effet "En train d'écrire"
            const typingDiv = document.createElement('div');
            typingDiv.className = 'nohan-typing';
            typingDiv.textContent = 'Nohan est en train de réfléchir...';
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch('{% url "nohan_chat" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        message: text,
                        history: history
                    })
                });

                const data = await response.json();
                typingDiv.remove();

                if (data.response) {
                    const aiDiv = document.createElement('div');
                    aiDiv.className = 'nohan-msg-ai';
                    
                    // Parsing des tags [PROPERTY_CARD:...]
                    let processedResponse = data.response.replace(/\n/g, '<br>');
                    const cardRegex = /\[PROPERTY_CARD:(.*?)\]/g;
                    processedResponse = processedResponse.replace(cardRegex, (match, dataStr) => {
                        try {
                            const pData = JSON.parse(dataStr.replace(/&quot;/g, '"'));
                            return `
                                <div class="nohan-property-card">
                                    <img src="${pData.image}" alt="${pData.title}">
                                    <div class="nohan-property-card-body">
                                        <div class="nohan-property-card-title">${pData.title}</div>
                                        <div class="nohan-property-card-price">${pData.price} FCFA</div>
                                        <a href="${pData.url}" class="nohan-property-btn" target="_blank">Voir l'annonce</a>
                                    </div>
                                </div>
                            `;
                        } catch(e) {
                            console.error("Card parsing error", e);
                            return "";
                        }
                    });

                    aiDiv.innerHTML = processedResponse;
                    messagesContainer.appendChild(aiDiv);
                    
                    // Mettre à jour l'historique
                    history.push({role: 'user', content: text});
                    history.push({role: 'model', content: data.response});
                    if (history.length > 10) history = history.slice(-10);
                } else {
                    throw new Error(data.error || 'Erreur inconnue');
                }
            } catch (error) {
                typingDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'text-danger small mb-2';
                errorDiv.textContent = "Désolé, j'ai eu un souci technique : " + error.message;
                messagesContainer.appendChild(errorDiv);
            }
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        sendBtn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    });
</script>
